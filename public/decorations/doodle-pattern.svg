    </g>
    <g id="doodle-cup">
      <path d="M-10,-4 L10,-4 L9,11 C9,16 4,19 0,19 C-4,19 -9,16 -9,11 Z" />
      <path d="M10,0 C19,0 19,10 10,10" />
      <path d="M-4,-11 C-6,-15 -2,-17 -4,-21" />
      <path d="M4,-11 C2,-15 6,-17 4,-21" />
    </g>
    <g id="doodle-gift">
      <rect x="-12" y="-2" width="24" height="16" rx="1.5" />
      <path d="M-14,-8 L14,-8 L14,-2 L-14,-2 Z" />
      <path d="M0,-8 L0,14" />
      <path d="M-4,-8 C-11,-8 -11,-16 -4,-15 C0,-14 0,-8 0,-8" />
      <path d="M4,-8 C11,-8 11,-16 4,-15 C0,-14 0,-8 0,-8" />
